<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>{{ offer.name }} — рекомендація</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: grid; place-items: center;
               padding: 20px; font-family: system-ui, sans-serif;
               background: linear-gradient(135deg, #111827, #4f46e5); color: #111827; }
        main { width: min(560px, 100%); background: #fff; border-radius: 22px;
               padding: 30px; box-shadow: 0 24px 80px rgba(0,0,0,.3); }
        h1 { margin: 0 0 12px; font-size: 30px; }
        p { color: #4b5563; line-height: 1.55; white-space: pre-line; }
        .label { display: inline-block; margin-bottom: 16px; padding: 6px 10px;
                 border-radius: 999px; background: #eef2ff; color: #4338ca;
                 font-size: 12px; font-weight: 800; }
        a { display: block; margin-top: 24px; padding: 14px 18px; border-radius: 12px;
            background: #4f46e5; color: #fff; text-align: center; text-decoration: none;
            font-weight: 800; }
        .disclosure { margin-top: 18px; font-size: 12px; color: #6b7280; }
    </style>
</head>
<body>
    <main>
        <span class="label">Рекомендація з Reels</span>
        <h1>{{ offer.name }}</h1>
        <p>{{ offer.description }}</p>
        <a href="{{ tracking_url }}">{{ offer.cta or 'Перевірити пропозицію' }}</a>
        <p class="disclosure">{{ offer.disclosure or 'Партнерське посилання: я можу отримати комісію без доплати для вас.' }}</p>
    </main>
</body>
</html>
