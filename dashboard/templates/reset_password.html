<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Новий пароль</title>
    <style>
        * { box-sizing:border-box; }
        body { margin:0; min-height:100vh; display:grid; place-items:center; padding:20px; font-family:system-ui,sans-serif; background:#eef2ff; color:#111827; }
        main { width:min(460px,100%); background:white; padding:32px; border-radius:18px; box-shadow:0 18px 50px rgba(30,41,59,.15); }
        h1 { margin-top:0; color:#4338ca; }
        p { color:#6b7280; line-height:1.55; }
        label { display:block; margin:16px 0 6px; font-weight:700; font-size:13px; }
        input { width:100%; padding:12px; border:2px solid #e5e7eb; border-radius:9px; font:inherit; }
        button { width:100%; margin-top:18px; padding:12px; border:0; border-radius:9px; background:#4f46e5; color:white; font-weight:800; cursor:pointer; }
        .error { padding:12px; border-radius:9px; margin:14px 0; background:#fef2f2; color:#b91c1c; }
        a { color:#4f46e5; font-weight:700; }
    </style>
</head>
<body>
    <main>
        <h1>Створіть новий пароль</h1>
        {% if not valid %}
            <div class="error">Посилання недійсне, вже використане або минуло 30 хвилин.</div>
            <p><a href="/forgot-password">Запросити нове посилання</a></p>
        {% else %}
            <p>Мінімум 12 символів, велика й мала літера та цифра.</p>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
            <form method="post" autocomplete="off">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <label for="password">Новий пароль</label>
                <input id="password" name="password" type="password" autocomplete="new-password" minlength="12" required autofocus>
                <label for="password_confirm">Повторіть пароль</label>
                <input id="password_confirm" name="password_confirm" type="password" autocomplete="new-password" minlength="12" required>
                <button type="submit">Змінити пароль</button>
            </form>
        {% endif %}
        <p><a href="/login">← До входу</a></p>
    </main>
</body>
</html>
