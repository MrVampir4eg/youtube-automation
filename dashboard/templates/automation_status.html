<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profit Platform</title>
  <style>
    :root{color-scheme:dark}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#080d18;color:#edf2ff;font:16px system-ui,sans-serif}
    main{width:min(560px,calc(100% - 40px));padding:34px;border:1px solid #263453;border-radius:22px;background:#111a2d;box-shadow:0 20px 70px #0008;text-align:center}
    .dot{display:inline-block;width:12px;height:12px;margin-right:8px;border-radius:50%;background:#31d17c;box-shadow:0 0 18px #31d17c}
    h1{margin:0 0 12px;font-size:30px}p{color:#aebbd6;line-height:1.55}.status{margin:26px 0;padding:16px;border-radius:14px;background:#0c1526;color:#d8e3fb}
    a{display:inline-block;margin-top:12px;padding:12px 18px;border-radius:10px;background:#635bff;color:white;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <main>
    <h1><span class="dot"></span>Profit Platform працює</h1>
    <p>Контент і публікації виконуються автоматично. Веб-адмінку вимкнено.</p>
    <div class="status">Планувальник: <strong>{{ 'активний' if scheduler_running else 'очікує запуску' }}</strong></div>
    <a href="/advertise">Рекламна співпраця</a>
  </main>
</body>
</html>
