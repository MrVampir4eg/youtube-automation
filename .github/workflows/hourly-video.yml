name: Generate and publish quality vertical videos

on:
  schedule:
    - cron: '5 6,12,18 * * *'
      timezone: 'Europe/Kyiv'
  workflow_dispatch:
    inputs:
      profile_id:
        description: 'Channel profile ID from the admin dashboard'
        required: false
        default: 'default'
      content_mode:
        description: 'organic or affiliate'
        required: false
        type: choice
        options: [organic, affiliate]
        default: organic
      affiliate_offer_id:
        description: 'Required only for affiliate mode'
        required: false
      publish_scope:
        description: 'Where the official bot may publish'
        required: false
        type: choice
        options: [all_enabled, youtube_only, create_only]
        default: all_enabled
      niche:
        description: 'Optional niche ID; blank uses safe rotation'
        required: false

permissions:
  contents: read

concurrency:
  group: scheduled-universal-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 100

    steps:
      - name: Wake Render and start one video
        id: start
        shell: bash
        env:
          BOT_TOKEN: ${{ secrets.AUTOMATION_API_TOKEN }}
          APP_URL: ${{ vars.PUBLIC_BASE_URL || '' }}
          PROFILE_ID: ${{ inputs.profile_id || vars.BOT_PROFILE_ID || 'default' }}
          CONTENT_MODE: ${{ inputs.content_mode || vars.BOT_CONTENT_MODE || 'organic' }}
          AFFILIATE_OFFER_ID: ${{ inputs.affiliate_offer_id || vars.BOT_AFFILIATE_OFFER_ID || '' }}
          PUBLISH_SCOPE: ${{ inputs.publish_scope || vars.BOT_PUBLISH_SCOPE || 'all_enabled' }}
          NICHE: ${{ inputs.niche || vars.BOT_NICHE || '' }}
          AUTO_ROTATE_CONTENT: ${{ vars.AUTO_ROTATE_CONTENT || 'true' }}
          AUTO_SELECT_AFFILIATE_OFFER: ${{ vars.AUTO_SELECT_AFFILIATE_OFFER || 'true' }}
          ORGANIC_NICHE: ${{ vars.BOT_ORGANIC_NICHE || 'tech' }}
          ANIME_NICHE: ${{ vars.BOT_ANIME_NICHE || 'anime' }}
          AFFILIATE_NICHE: ${{ vars.BOT_AFFILIATE_NICHE || 'tech' }}
        run: |
          set -euo pipefail

          if [[ -z "$BOT_TOKEN" ]]; then
            echo "Add AUTOMATION_API_TOKEN to GitHub Actions secrets" >&2
            exit 1
          fi
          if [[ -z "$APP_URL" ]]; then
            echo "Add PUBLIC_BASE_URL as a GitHub Actions variable" >&2
            exit 1
          fi

          # Three controlled slots: useful organic content, anime reach, and
          # one partner slot only when a real approved offer is configured.
          # Manual workflow inputs always win over the rotation.
          if [[ -z "${{ inputs.content_mode }}" && "$AUTO_ROTATE_CONTENT" == "true" ]]; then
            local_hour="$(TZ=Europe/Kyiv date +%H)"
            case "$local_hour" in
              06)
                CONTENT_MODE="organic"
                NICHE="$ORGANIC_NICHE"
                ;;
              12)
                CONTENT_MODE="organic"
                NICHE="$ANIME_NICHE"
                ;;
              18)
                if [[ -n "$AFFILIATE_OFFER_ID" || "$AUTO_SELECT_AFFILIATE_OFFER" == "true" ]]; then
                  CONTENT_MODE="affiliate"
                  NICHE="$AFFILIATE_NICHE"
                  if [[ -z "$AFFILIATE_OFFER_ID" ]]; then
                    AFFILIATE_OFFER_ID="auto"
                  fi
                else
                  CONTENT_MODE="organic"
                  NICHE="$ORGANIC_NICHE"
                fi
                ;;
            esac
          fi

          app_url="${APP_URL%/}"
          payload="$(
            jq -n \
              --arg profile "$PROFILE_ID" \
              --arg mode "$CONTENT_MODE" \
              --arg offer "$AFFILIATE_OFFER_ID" \
              --arg scope "$PUBLISH_SCOPE" \
              --arg niche "$NICHE" \
              '{
                count: 1,
                profile_id: $profile,
                content_mode: $mode,
                affiliate_offer_id: (if $offer == "" then null else $offer end),
                publish_scope: $scope,
                niche: (if $niche == "" then null else $niche end)
              }'
          )"
          response_file="$(mktemp)"
          http_code="$(
            curl --silent --show-error \
              --retry 6 \
              --retry-delay 10 \
              --retry-all-errors \
              --connect-timeout 30 \
              --max-time 300 \
              --output "$response_file" \
              --write-out '%{http_code}' \
              --request POST \
              --header 'Content-Type: application/json' \
              --header "Authorization: Bearer $BOT_TOKEN" \
              --data "$payload" \
              "$app_url/api/generate"
          )"

          cat "$response_file"

          if [[ "$http_code" != "202" && "$http_code" != "409" ]]; then
            echo "Generation request failed with HTTP $http_code" >&2
            exit 1
          fi

          job_id="$(jq -r '.job_id // empty' "$response_file")"
          if [[ -z "$job_id" ]]; then
            echo "Render did not return a generation job ID" >&2
            exit 1
          fi

          echo "app_url=$app_url" >> "$GITHUB_OUTPUT"
          echo "job_id=$job_id" >> "$GITHUB_OUTPUT"

      - name: Keep Render awake until upload finishes
        shell: bash
        env:
          APP_URL: ${{ steps.start.outputs.app_url }}
          JOB_ID: ${{ steps.start.outputs.job_id }}
          BOT_TOKEN: ${{ secrets.AUTOMATION_API_TOKEN }}
        run: |
          set -euo pipefail

          for attempt in $(seq 1 180); do
            sleep 30

            response_file="$(mktemp)"
            http_code="$(
              curl --silent --show-error \
                --retry 3 \
                --retry-delay 5 \
                --retry-all-errors \
                --connect-timeout 30 \
                --max-time 120 \
                --header "Authorization: Bearer $BOT_TOKEN" \
                --output "$response_file" \
                --write-out '%{http_code}' \
                "$APP_URL/api/generate/$JOB_ID"
            )"

            if [[ "$http_code" != "200" ]]; then
              echo "Status check $attempt returned HTTP $http_code"
              cat "$response_file"
              continue
            fi

            status="$(jq -r '.status // "unknown"' "$response_file")"
            echo "Status check $attempt: $status"

            if [[ "$status" == "failed" ]]; then
              cat "$response_file"
              exit 1
            fi

            if [[ "$status" == "completed" ]]; then
              cat "$response_file"

              active_count="$(jq -r '[.videos[0].platform_results[]? | select(.status == "published" or .status == "processing" or .status == "awaiting_user")] | length' "$response_file")"
              failed="$(jq -r '[.videos[0].platform_results | to_entries[]? | select(.value.status == "failed") | (.key + ": " + (.value.error // "unknown error"))] | join("; ")' "$response_file")"

              if [[ -n "$failed" ]]; then
                echo "Some platforms failed, other destinations continue: $failed" >&2
              fi

              if [[ "$active_count" == "0" ]]; then
                echo "MP4 was generated, but no enabled platform accepted it. Check AUTO_UPLOAD, AUTO_PUBLISH_PLATFORMS and platform tokens." >&2
                exit 1
              fi

              echo "Universal publishing completed for $active_count destination(s)"
              exit 0
            fi
          done

          echo "Generation did not finish within 90 minutes" >&2
          exit 1
