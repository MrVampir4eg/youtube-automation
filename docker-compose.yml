version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_PORT=5000
      - FLASK_DEBUG=False
      - DATABASE_URL=sqlite:///youtube_automation.db
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./database:/app/database
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
